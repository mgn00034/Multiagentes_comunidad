# agents.yaml — Plantillas para la generación automática de agentes
#
# Este fichero NO contiene una lista de agentes concretos.  Define las
# plantillas (clase, módulo, parámetros base) y la cantidad de agentes
# por modalidad.  El lanzador (main.py) construye en tiempo de
# ejecución la lista concreta a partir de los datos del alumno
# definidos en config.yaml (sección "alumno"):
#
#   usuario_uja  →  parte local del JID
#   modalidad    →  "laboratorio" o "torneo"
#
# Patrón de nombres generados:
#   tablero_<usuario_uja>_NN     (NN = 01, 02, …)
#   jugador_<usuario_uja>_NN
#
# El agente supervisor NO aparece en este fichero porque se ejecuta
# por separado mediante:
#   python supervisor_main.py --modo laboratorio | torneo | consulta


# ══════════════════════════════════════════════════════════════════
# CANTIDAD DE AGENTES POR MODALIDAD
# ══════════════════════════════════════════════════════════════════
# laboratorio: pruebas de concurrencia en el puesto del alumno.
# torneo:      competición conjunta (un único tablero/jugador propio).

modalidades:
  laboratorio:
    num_tableros: 4
    num_jugadores: 12
  torneo:
    num_tableros: 1
    num_jugadores: 1
  prueba_local:
    num_tableros: 1
    num_jugadores: 2

# ══════════════════════════════════════════════════════════════════
# PLANTILLA DE AGENTE TABLERO
# ══════════════════════════════════════════════════════════════════
# Cada tablero gestiona una única partida.  El puerto del dashboard
# web se asigna automáticamente: puerto_web_base + índice (0, 1, …).

plantilla_tablero:
  clase: AgenteTablero
  modulo: agentes.agente_tablero
  nivel: 1
  descripcion: "Tablero de Tic-Tac-Toe — gestiona una partida"
  parametros:
    # Puerto base para la visualización web.  Cada tablero generado
    # recibe puerto_web = puerto_web_base + índice del tablero, de
    # modo que no se solapan entre sí.
    puerto_web_base: 15000


# ══════════════════════════════════════════════════════════════════
# PLANTILLA DE AGENTE JUGADOR
# ══════════════════════════════════════════════════════════════════
# Cada jugador busca tableros disponibles y juega partidas en
# paralelo.  El nivel de estrategia se toma de config.yaml
# (alumno.nivel_estrategia) para que sea idéntico en todos los
# jugadores generados.

plantilla_jugador:
  clase: AgenteJugador
  modulo: agentes.agente_jugador
  nivel: 1
  descripcion: "Jugador de Tic-Tac-Toe — busca tableros y juega partidas"
  parametros:
    max_partidas: 3

# torneos.yaml — Definición de salas MUC para pruebas en laboratorio
#
# Este fichero lo gestiona el profesor. Define las salas MUC que el
# supervisor creará en el servicio de conferencias del servidor XMPP
# (conference.{dominio}).
#
# USO:
#   python supervisor_main.py --torneos config/torneos.yaml
#
# Los ordenadores del laboratorio siguen el patrón L2PCnn:
#   L2PC00 = profesor (ejecuta el supervisor)
#   L2PC01 a L2PC30 = alumnos (ejecutan sus agentes)
#
# Cada alumno usa como sala el identificador de su puesto:
#   L2PCnn → sala_asignada: sala_pcnn
#
# CAMPOS:
#   nombre:      Identificador único de la entrada
#   sala:        Nombre de la sala MUC (parte local del JID)
#   descripcion: Texto breve que describe la sala
#   tableros:    (opcional) Lista informativa de tableros esperados
#   jugadores:   (opcional) Lista informativa de jugadores esperados
#
# Las listas de tableros y jugadores son informativas en modo
# distribuido (cada alumno decide su nombre al arrancar su agente).
# En modo local sirven para inyectar sala_asignada automáticamente.


# ══════════════════════════════════════════════════════════════════
#  FASE A: Pruebas individuales por puesto
# ══════════════════════════════════════════════════════════════════
# Una sala por cada puesto de alumno del laboratorio (L2PC01-L2PC30).
# El supervisor se une a todas y monitoriza cada una por separado.
# Cada alumno ejecuta 3 tableros + 12 jugadores en su sala.

torneos:

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 850" font-family="'Source Sans 3','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M1,1 L7,3 L1,5" fill="none" stroke="#009E73" stroke-width="1.2"/>
    </marker>
    <marker id="arr-err" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M1,1 L7,3 L1,5" fill="none" stroke="#C62828" stroke-width="1.2"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M1,1 L7,3 L1,5" fill="none" stroke="#0072B2" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="780" height="850" rx="8" fill="#FFFFFF"/>

  <!-- Titulo -->
  <text x="390" y="36" fill="#333" font-size="16" font-weight="700" text-anchor="middle" font-family="'Crimson Pro',serif">Flujo de datos completo</text>

  <!-- ═══ PASO 1: Tablero termina ═══ -->
  <rect x="220" y="58" width="340" height="42" rx="6" fill="#E3F2FD" stroke="#0072B2" stroke-width="1.2"/>
  <text x="390" y="84" fill="#005A8C" text-anchor="middle" font-weight="600" font-family="'JetBrains Mono',monospace">Tablero termina partida</text>

  <line x1="390" y1="100" x2="390" y2="126" stroke="#009E73" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ PASO 2: Presencia ═══ -->
  <rect x="170" y="130" width="440" height="42" rx="6" fill="rgba(249,168,37,0.1)" stroke="#F9A825" stroke-width="1.2"/>
  <text x="390" y="150" fill="#8B6914" text-anchor="middle" font-weight="500">Tablero actualiza presencia MUC</text>
  <text x="390" y="165" fill="#666" text-anchor="middle" font-size="11">status = "finished"</text>

  <line x1="390" y1="172" x2="390" y2="198" stroke="#009E73" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ PASO 3: MonitorizarMUC detecta ═══ -->
  <rect x="170" y="202" width="440" height="42" rx="6" fill="#E8F5E9" stroke="#009E73" stroke-width="1.2"/>
  <text x="390" y="222" fill="#007A59" text-anchor="middle" font-weight="600" font-family="'JetBrains Mono',monospace">MonitorizarMUCBehaviour</text>
  <text x="390" y="237" fill="#666" text-anchor="middle" font-size="11">detecta status="finished" (cada 10 s)</text>

  <line x1="390" y1="244" x2="390" y2="270" stroke="#009E73" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ PASO 4: Envia REQUEST ═══ -->
  <rect x="200" y="274" width="380" height="42" rx="6" fill="#FFF3E0" stroke="#D55E00" stroke-width="1.2"/>
  <text x="390" y="294" fill="#B34700" text-anchor="middle" font-weight="500">Envia REQUEST game-report</text>
  <text x="390" y="309" fill="#666" text-anchor="middle" font-size="11">thread: report-{id}-{timestamp}</text>

  <!-- ═══ BIFURCACION ═══ -->
  <polygon points="390,340 440,370 390,400 340,370" fill="#F5F5F5" stroke="#888" stroke-width="1.2"/>
  <text x="390" y="374" fill="#333" text-anchor="middle" font-size="11" font-weight="500">Respuesta</text>

  <!-- Rama izquierda: INFORM -->
  <line x1="340" y1="370" x2="210" y2="370" stroke="#009E73" stroke-width="1.5"/>
  <line x1="210" y1="370" x2="210" y2="430" stroke="#009E73" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="270" y="362" fill="#007A59" font-size="11" font-weight="600">INFORM</text>

  <!-- Rama derecha: REFUSE -->
  <line x1="440" y1="370" x2="570" y2="370" stroke="#C62828" stroke-width="1.5"/>
  <line x1="570" y1="370" x2="570" y2="430" stroke="#C62828" stroke-width="1.5" marker-end="url(#arr-err)"/>
  <text x="500" y="362" fill="#C62828" font-size="11" font-weight="600">REFUSE</text>

  <!-- ═══ Rama INFORM ═══ -->
  <rect x="60" y="434" width="300" height="42" rx="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.2"/>
  <text x="210" y="454" fill="#7B1FA2" text-anchor="middle" font-weight="600" font-family="'JetBrains Mono',monospace">RecibirInformeBehaviour</text>
  <text x="210" y="469" fill="#666" text-anchor="middle" font-size="11">parsea JSON + valida ontologia</text>

  <line x1="210" y1="476" x2="210" y2="502" stroke="#009E73" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Almacena informe -->
  <rect x="60" y="506" width="300" height="52" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.2"/>
  <text x="210" y="528" fill="#2E7D32" text-anchor="middle" font-weight="500" font-family="'JetBrains Mono',monospace">informes_por_sala[id][jid] = cuerpo</text>
  <text x="210" y="548" fill="#666" text-anchor="middle" font-size="11">log_por_sala[id] += evento</text>

  <!-- ═══ Rama REFUSE ═══ -->
  <rect x="420" y="434" width="300" height="52" rx="6" fill="rgba(198,40,40,0.06)" stroke="#C62828" stroke-width="1.2"/>
  <text x="570" y="454" fill="#C62828" text-anchor="middle" font-weight="500">reason: "not-finished"</text>
  <text x="570" y="469" fill="#666" text-anchor="middle" font-size="11">tableros_consultados.discard(jid)</text>
  <text x="570" y="480" fill="#888" text-anchor="middle" font-size="10">(permite reintento en proximo ciclo)</text>

  <!-- Flecha retorno REFUSE → MonitorizarMUC -->
  <line x1="570" y1="486" x2="570" y2="510" stroke="#C62828" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="570" y1="510" x2="700" y2="510" stroke="#C62828" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="700" y1="510" x2="700" y2="222" stroke="#C62828" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="700" y1="222" x2="614" y2="222" stroke="#C62828" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-err)"/>
  <text x="714" y="370" fill="#C62828" font-size="10" transform="rotate(-90,714,370)">reintento</text>

  <!-- ═══ SEPARADOR FRONTEND ═══ -->
  <line x1="40" y1="590" x2="740" y2="590" stroke="#ddd" stroke-width="1" stroke-dasharray="8,4"/>
  <rect x="320" y="580" width="140" height="20" rx="4" fill="#FFFFFF"/>
  <text x="390" y="594" fill="#888" text-anchor="middle" font-size="11" font-style="italic">Frontend (navegador)</text>

  <!-- ═══ PASO 5: Polling ═══ -->
  <rect x="200" y="618" width="380" height="42" rx="6" fill="#E3F2FD" stroke="#0072B2" stroke-width="1.2"/>
  <text x="390" y="638" fill="#005A8C" text-anchor="middle" font-weight="500" font-family="'JetBrains Mono',monospace">GET /supervisor/api/state</text>
  <text x="390" y="653" fill="#666" text-anchor="middle" font-size="11">polling cada 5 segundos</text>

  <line x1="390" y1="660" x2="390" y2="686" stroke="#0072B2" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ═══ PASO 6: Handler ═══ -->
  <rect x="200" y="690" width="380" height="42" rx="6" fill="#F5F5F5" stroke="#aaa" stroke-width="1"/>
  <text x="390" y="710" fill="#333" text-anchor="middle" font-weight="500" font-family="'JetBrains Mono',monospace">handler_supervisor_state()</text>
  <text x="390" y="725" fill="#666" text-anchor="middle" font-size="11">lee estado interno del agente</text>

  <line x1="390" y1="732" x2="390" y2="758" stroke="#0072B2" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ═══ PASO 7: Renderiza ═══ -->
  <rect x="200" y="762" width="380" height="52" rx="6" fill="rgba(249,168,37,0.1)" stroke="#F9A825" stroke-width="1.2"/>
  <text x="390" y="784" fill="#8B6914" text-anchor="middle" font-weight="600">Responde JSON</text>
  <text x="390" y="802" fill="#666" text-anchor="middle" font-size="11">Frontend renderiza: Informes | Agentes | Ranking | Log</text>

  <!-- Leyenda -->
  <rect x="35" y="614" width="148" height="60" rx="5" fill="#F5F5F5" stroke="#ddd" stroke-width="0.5"/>
  <rect x="44" y="624" width="10" height="10" rx="2" fill="#009E73"/>
  <text x="60" y="634" fill="#333" font-size="10">Flujo principal</text>
  <rect x="44" y="642" width="10" height="10" rx="2" fill="#C62828"/>
  <text x="60" y="652" fill="#333" font-size="10">Rechazo / reintento</text>
  <rect x="44" y="660" width="10" height="10" rx="2" fill="#0072B2"/>
  <text x="60" y="670" fill="#333" font-size="10">Polling HTTP</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!--
  Composición de un thread único generado por crear_thread_unico
  Sistemas Multiagente — Universidad de Jaén
-->
<svg viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <rect width="640" height="280" fill="#f8f9fa" rx="8"/>

  <text x="320" y="24" text-anchor="middle" fill="#1a3a52" font-weight="bold" font-size="13">Anatomía de un thread único</text>
  <text x="320" y="40" text-anchor="middle" fill="#5c756a" font-size="10">crear_thread_unico(jid_agente, prefijo)</text>

  <!-- Resultado compuesto (48 chars monospace font-size 14, centrado en x=320) -->
  <rect x="40" y="64" width="560" height="44" rx="6" fill="#fff" stroke="#2070b0" stroke-width="1.5"/>
  <text x="320" y="92" text-anchor="middle" fill="#1a3a52" font-weight="bold" font-size="14">game-tablero_03-7f3cab92d4e14f7b9a1c0e2f8d5b6a3c</text>

  <!-- Divisores alineados con los guiones reales del thread -->
  <!-- Guión tras "game"        : índice 4  -> x ≈ 156 -->
  <!-- Guión tras "tablero_03"  : índice 15 -> x ≈ 249 -->
  <line x1="156" y1="58" x2="156" y2="114" stroke="#b0b8b4" stroke-width="1"/>
  <line x1="249" y1="58" x2="249" y2="114" stroke="#b0b8b4" stroke-width="1"/>

  <!-- Etiquetas de cada tramo, alineadas con los divisores -->
  <rect x="56" y="124" width="100" height="26" rx="4" fill="#e8f2ec" stroke="#2d8a6e" stroke-width="1"/>
  <text x="106" y="141" text-anchor="middle" fill="#1a6b50" font-weight="bold" font-size="11">prefijo</text>

  <rect x="156" y="124" width="93" height="26" rx="4" fill="#fff5f0" stroke="#c05020" stroke-width="1"/>
  <text x="202" y="141" text-anchor="middle" fill="#c05020" font-weight="bold" font-size="11">localpart</text>

  <rect x="249" y="124" width="345" height="26" rx="4" fill="#f0f6ff" stroke="#2070b0" stroke-width="1"/>
  <text x="421" y="141" text-anchor="middle" fill="#2070b0" font-weight="bold" font-size="11">UUID4 en hexadecimal (128 bits)</text>

  <!-- Lineas punteadas en escalera: cada una llega hasta la altura de su descripcion -->
  <line x1="106" y1="150" x2="106" y2="166" stroke="#b0b8b4" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="202" y1="150" x2="202" y2="196" stroke="#b0b8b4" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="421" y1="150" x2="421" y2="226" stroke="#b0b8b4" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Descripciones escalonadas (sin superposicion horizontal entre columnas) -->
  <!-- Col 1 (prefijo) - nivel alto -->
  <text x="106" y="176" text-anchor="middle" fill="#5c756a" font-size="9">Tipo de conversación</text>
  <text x="106" y="188" text-anchor="middle" fill="#5c756a" font-size="9">join · game · report</text>

  <!-- Col 2 (localpart) - nivel medio -->
  <text x="202" y="206" text-anchor="middle" fill="#5c756a" font-size="9">Localpart del JID emisor</text>
  <text x="202" y="218" text-anchor="middle" fill="#5c756a" font-size="9">único en el dominio XMPP</text>

  <!-- Col 3 (uuid4) - nivel bajo -->
  <text x="421" y="236" text-anchor="middle" fill="#5c756a" font-size="9">Generador aleatorio</text>
  <text x="421" y="248" text-anchor="middle" fill="#5c756a" font-size="9">colisión ≈ 2⁻¹²⁸ (prácticamente imposible)</text>

  <!-- Regla inferior -->
  <line x1="40" y1="260" x2="600" y2="260" stroke="#b0b8b4" stroke-width="0.5" stroke-dasharray="6,4"/>
  <text x="320" y="274" text-anchor="middle" fill="#1a3a52" font-size="10" font-style="italic">Los tres componentes juntos hacen imposible que dos agentes distintos generen el mismo thread.</text>
</svg>

<svg viewBox="0 0 780 560" xmlns="http://www.w3.org/2000/svg" font-family="'Source Sans 3','Segoe UI',sans-serif" font-size="11">
  <defs>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M1,1 L7,3 L1,5" fill="none" stroke="#009E73" stroke-width="1.2"/></marker>
    <marker id="av" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M1,1 L7,3 L1,5" fill="none" stroke="#4CAF50" stroke-width="1.2"/></marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M1,1 L7,3 L1,5" fill="none" stroke="#0072B2" stroke-width="1.2"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M1,1 L7,3 L1,5" fill="none" stroke="#D55E00" stroke-width="1.2"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M1,1 L7,3 L1,5" fill="none" stroke="#C62828" stroke-width="1.2"/></marker>
    <marker id="ak" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M1,1 L7,3 L1,5" fill="none" stroke="#555" stroke-width="1.2"/></marker>
  </defs>

  <rect width="780" height="560" fill="#FFFFFF"/>

  <!-- Titulo -->
  <text x="390" y="20" text-anchor="middle" font-family="'Crimson Pro',serif" font-size="12" fill="#333" font-weight="700">Diagrama de estados: SolicitarInformeFSM (FSMBehaviour)</text>

  <!-- ═══════════════ ESTADOS ═══════════════ -->

  <!-- Inicio -->
  <circle cx="370" cy="42" r="8" fill="#333"/>

  <!-- ENVIAR_REQUEST -->
  <rect x="270" y="64" width="200" height="40" rx="6" fill="#E8F5E9" stroke="#009E73" stroke-width="1.5"/>
  <text x="370" y="82" text-anchor="middle" fill="#007A59" font-size="11" font-weight="700" font-family="'JetBrains Mono',monospace">ENVIAR_REQUEST</text>
  <text x="370" y="98" text-anchor="middle" fill="#666" font-size="9">REQUEST game-report</text>

  <!-- ESPERAR_RESPUESTA -->
  <rect x="240" y="140" width="260" height="66" rx="6" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="370" y="164" text-anchor="middle" fill="#8B6914" font-size="11" font-weight="700" font-family="'JetBrains Mono',monospace">ESPERAR_RESPUESTA</text>
  <text x="370" y="180" text-anchor="middle" fill="#666" font-size="9">receive(timeout=10 s)</text>
  <text x="370" y="196" text-anchor="middle" fill="#888" font-size="8">Clasifica: agree / inform / refuse / timeout</text>

  <!-- ESPERAR_INFORME -->
  <rect x="260" y="280" width="220" height="54" rx="6" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="370" y="302" text-anchor="middle" fill="#8B6914" font-size="11" font-weight="700" font-family="'JetBrains Mono',monospace">ESPERAR_INFORME</text>
  <text x="370" y="318" text-anchor="middle" fill="#666" font-size="9">receive(timeout=10 s) — solo INFORM o timeout</text>

  <!-- PROCESAR_INFORME (final) -->
  <rect x="20" y="410" width="190" height="48" rx="6" fill="#E3F2FD" stroke="#0072B2" stroke-width="1.5"/>
  <text x="115" y="430" text-anchor="middle" fill="#005A8C" font-size="11" font-weight="700" font-family="'JetBrains Mono',monospace">PROCESAR_INFORME</text>
  <text x="115" y="448" text-anchor="middle" fill="#666" font-size="9">Validar + almacenar (A/A2)</text>
  <circle cx="115" cy="476" r="7" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="115" cy="476" r="3.5" fill="#333"/>

  <!-- PROCESAR_RECHAZO (final) -->
  <rect x="270" y="410" width="190" height="48" rx="6" fill="#FFF3E0" stroke="#D55E00" stroke-width="1.5"/>
  <text x="365" y="430" text-anchor="middle" fill="#B34700" font-size="11" font-weight="700" font-family="'JetBrains Mono',monospace">PROCESAR_RECHAZO</text>
  <text x="365" y="448" text-anchor="middle" fill="#666" font-size="9">Desbloquear tablero (B)</text>
  <circle cx="365" cy="476" r="7" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="365" cy="476" r="3.5" fill="#333"/>

  <!-- REGISTRAR_TIMEOUT (final) -->
  <rect x="560" y="410" width="190" height="48" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="655" y="430" text-anchor="middle" fill="#C62828" font-size="11" font-weight="700" font-family="'JetBrains Mono',monospace">REGISTRAR_TIMEOUT</text>
  <text x="655" y="448" text-anchor="middle" fill="#666" font-size="9">Log incidencia (C)</text>
  <circle cx="655" cy="476" r="7" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="655" cy="476" r="3.5" fill="#333"/>

  <!-- ═══════════════ TRANSICIONES ═══════════════ -->

  <!-- T0: Inicio → ENVIAR_REQUEST -->
  <line x1="370" y1="50" x2="370" y2="64" stroke="#555" stroke-width="1.2" marker-end="url(#ak)"/>

  <!-- T1: ENVIAR_REQUEST → ESPERAR_RESPUESTA [siempre] -->
  <line x1="370" y1="104" x2="370" y2="140" stroke="#009E73" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- T2: ESPERAR_RESPUESTA → ESPERAR_INFORME [agree] -->
  <!-- Vertical centro, etiqueta integrada con fondo opaco -->
  <line x1="370" y1="206" x2="370" y2="280" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#av)"/>
  <rect x="344" y="234" width="52" height="16" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
  <text x="370" y="246" text-anchor="middle" fill="#2E7D32" font-size="9" font-weight="600">agree</text>

  <!-- T3: ESPERAR_RESPUESTA → PROCESAR_INFORME [inform] -->
  <!-- Sale izquierda (y=168), canal x=100, etiqueta integrada en tramo horizontal -->
  <line x1="240" y1="168" x2="100" y2="168" stroke="#0072B2" stroke-width="1.3"/>
  <line x1="100" y1="168" x2="100" y2="410" stroke="#0072B2" stroke-width="1.3" marker-end="url(#ab)"/>
  <rect x="138" y="160" width="54" height="16" rx="3" fill="#E3F2FD" stroke="#0072B2" stroke-width="0.5"/>
  <text x="165" y="172" text-anchor="middle" fill="#005A8C" font-size="9" font-weight="600">inform</text>

  <!-- T4: ESPERAR_RESPUESTA → PROCESAR_RECHAZO [refuse] -->
  <!-- Sale abajo (x=430), derecha a x=520, baja, izquierda a x=400, baja -->
  <!-- Routea por la DERECHA de ESPERAR_INFORME (borde der. en x=480) -->
  <line x1="430" y1="206" x2="430" y2="228" stroke="#D55E00" stroke-width="1.3"/>
  <line x1="430" y1="228" x2="520" y2="228" stroke="#D55E00" stroke-width="1.3"/>
  <line x1="520" y1="228" x2="520" y2="378" stroke="#D55E00" stroke-width="1.3"/>
  <line x1="520" y1="378" x2="400" y2="378" stroke="#D55E00" stroke-width="1.3"/>
  <line x1="400" y1="378" x2="400" y2="410" stroke="#D55E00" stroke-width="1.3" marker-end="url(#ao)"/>
  <rect x="495" y="250" width="50" height="16" rx="3" fill="#FFF3E0" stroke="#D55E00" stroke-width="0.5"/>
  <text x="520" y="262" text-anchor="middle" fill="#B34700" font-size="9" font-weight="600">refuse</text>

  <!-- T5: ESPERAR_RESPUESTA → REGISTRAR_TIMEOUT [timeout] -->
  <!-- Sale derecha (y=173), canal x=655, etiqueta integrada en tramo horizontal -->
  <line x1="500" y1="173" x2="655" y2="173" stroke="#C62828" stroke-width="1.3"/>
  <line x1="655" y1="173" x2="655" y2="410" stroke="#C62828" stroke-width="1.3" marker-end="url(#ar)"/>
  <rect x="549" y="165" width="56" height="16" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="0.5"/>
  <text x="577" y="177" text-anchor="middle" fill="#C62828" font-size="9" font-weight="600">timeout</text>

  <!-- T6: ESPERAR_INFORME → PROCESAR_INFORME [inform] -->
  <!-- Sale izquierda (y=307), canal x=140, etiqueta integrada en tramo horizontal -->
  <line x1="260" y1="307" x2="140" y2="307" stroke="#0072B2" stroke-width="1.3"/>
  <line x1="140" y1="307" x2="140" y2="410" stroke="#0072B2" stroke-width="1.3" marker-end="url(#ab)"/>
  <rect x="168" y="299" width="54" height="16" rx="3" fill="#E3F2FD" stroke="#0072B2" stroke-width="0.5"/>
  <text x="195" y="311" text-anchor="middle" fill="#005A8C" font-size="9" font-weight="600">inform</text>

  <!-- T7: ESPERAR_INFORME → REGISTRAR_TIMEOUT [timeout] -->
  <!-- Sale derecha (y=297), canal x=655, etiqueta integrada en tramo vertical -->
  <line x1="480" y1="297" x2="655" y2="297" stroke="#C62828" stroke-width="1.3"/>
  <rect x="627" y="330" width="56" height="16" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="0.5"/>
  <text x="655" y="342" text-anchor="middle" fill="#C62828" font-size="9" font-weight="600">timeout</text>

  <!-- ═══════════════ LEYENDA ═══════════════ -->
  <rect x="10" y="500" width="760" height="48" rx="5" fill="#F5F5F5" stroke="#ddd" stroke-width="0.5"/>

  <circle cx="28" cy="516" r="5" fill="#333"/>
  <text x="40" y="520" fill="#333" font-size="9">Inicio</text>

  <rect x="88" y="510" width="14" height="12" rx="3" fill="#E8F5E9" stroke="#009E73" stroke-width="0.8"/>
  <text x="108" y="520" fill="#333" font-size="9">Estado inicial</text>

  <rect x="192" y="510" width="14" height="12" rx="3" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="212" y="520" fill="#333" font-size="9">Estado de espera</text>

  <circle cx="318" cy="516" r="5" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="318" cy="516" r="2.5" fill="#333"/>
  <text x="328" y="520" fill="#333" font-size="9">Final (FSM termina)</text>

  <line x1="28" y1="538" x2="48" y2="538" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="54" y="542" fill="#333" font-size="9">agree</text>
  <line x1="100" y1="538" x2="120" y2="538" stroke="#0072B2" stroke-width="1.5"/>
  <text x="126" y="542" fill="#333" font-size="9">inform (A/A2)</text>
  <line x1="210" y1="538" x2="230" y2="538" stroke="#D55E00" stroke-width="1.5"/>
  <text x="236" y="542" fill="#333" font-size="9">refuse (B)</text>
  <line x1="310" y1="538" x2="330" y2="538" stroke="#C62828" stroke-width="1.5"/>
  <text x="336" y="542" fill="#333" font-size="9">timeout (C)</text>
</svg>

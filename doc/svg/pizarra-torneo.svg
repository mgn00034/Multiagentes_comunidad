<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 280" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13">

  <!-- Fondo blanco -->
  <rect x="0" y="0" width="580" height="280" rx="8" fill="#ffffff"/>

  <!-- Marco exterior -->
  <rect x="15" y="15" width="550" height="250" rx="10" fill="#fffbf5" stroke="#e65100" stroke-width="2"/>

  <!-- Cabecera -->
  <rect x="15" y="15" width="550" height="44" rx="10" fill="#e65100"/>
  <rect x="15" y="40" width="550" height="19" fill="#e65100"/>
  <text x="290" y="44" text-anchor="middle" font-weight="bold" fill="white" font-size="16">TORNEO — Sala unica para TODOS</text>

  <!-- Instruccion principal -->
  <text x="40" y="100" fill="#333" font-size="14">Cambiar <tspan font-weight="bold">TODOS</tspan> vuestros agentes a:</text>

  <rect x="55" y="118" width="430" height="38" rx="6" fill="white" stroke="#e65100" stroke-width="1"/>
  <text x="270" y="143" text-anchor="middle" fill="#e65100" font-size="16" font-weight="bold" font-family="'JetBrains Mono','Courier New',monospace">sala_asignada: torneo_lab</text>

  <!-- Notas -->
  <text x="40" y="192" fill="#555" font-size="13">Mantened vuestros nombres: <tspan font-weight="bold">tablero_USUARIO</tspan></text>
  <text x="40" y="214" fill="#555" font-size="13">y <tspan font-weight="bold">jugador_USUARIO</tspan> (usuario UJA).</text>

  <text x="40" y="248" fill="#555" font-size="13">Cada alumno: <tspan font-weight="bold">1 tablero + 1 jugador</tspan>.</text>
</svg>
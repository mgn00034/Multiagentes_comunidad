<?xml version="1.0" encoding="UTF-8"?>
<!--
  Diagrama de secuencia: Protocolo de inscripción (jugador → tablero)
  Sistemas Multiagente — Universidad de Jaén
  Nivel 1: Agentes FIPA con SPADE
-->
<svg viewBox="0 0 520 240" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <rect width="520" height="240" fill="#f8f9fa" rx="8"/>
  <defs><marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d8a6e"/></marker></defs>
  <rect x="60" y="8" width="80" height="22" rx="4" fill="#fff5f0" stroke="#c05020" stroke-width="1.5"/>
  <text x="100" y="23" text-anchor="middle" fill="#c05020" font-weight="bold">Jugador</text>
  <rect x="380" y="8" width="80" height="22" rx="4" fill="#f0f6ff" stroke="#2070b0" stroke-width="1.5"/>
  <text x="420" y="23" text-anchor="middle" fill="#2070b0" font-weight="bold">Tablero</text>
  <line x1="100" y1="30" x2="100" y2="235" stroke="#b0b8b4" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="420" y1="30" x2="420" y2="235" stroke="#b0b8b4" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="100" y1="52" x2="420" y2="52" stroke="#2d8a6e" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="260" y="47" text-anchor="middle" fill="#1a6b50" font-weight="bold">REQUEST join</text>
  <text x="260" y="65" text-anchor="middle" fill="#5c756a" font-size="9">ontology=tictactoe · performative=request</text>
  <text x="260" y="76" text-anchor="middle" fill="#c05020" font-size="9">conversation-id=join · thread=join-{jid}-{ts}</text>
  <line x1="420" y1="100" x2="100" y2="100" stroke="#2d8a6e" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="260" y="95" text-anchor="middle" fill="#1a6b50" font-weight="bold">AGREE join-accepted</text>
  <text x="260" y="113" text-anchor="middle" fill="#5c756a" font-size="9">performative=agree · body: {symbol: "X"}</text>
  <line x1="60" y1="135" x2="460" y2="135" stroke="#b0b8b4" stroke-width="0.5" stroke-dasharray="6,4"/>
  <text x="260" y="148" text-anchor="middle" fill="#5c756a" font-size="10" font-style="italic">-- o bien --</text>
  <line x1="420" y1="172" x2="100" y2="172" stroke="#c05020" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="260" y="167" text-anchor="middle" fill="#c05020" font-weight="bold">REFUSE join-refused</text>
  <text x="260" y="186" text-anchor="middle" fill="#5c756a" font-size="9">performative=refuse · body: {reason: "full"}</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 545" font-family="'Source Sans 3','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13">
  <defs>
    <marker id="fk" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M1,1 L7,3 L1,5" fill="none" stroke="#0072B2" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="860" height="545" rx="8" fill="#FFFFFF"/>

  <!-- Titulo -->
  <text x="430" y="28" fill="#1B5E20" font-size="15" font-weight="700" text-anchor="middle"
        font-family="'Crimson Pro',serif">Esquema relacional — Base de datos SQLite del Agente Supervisor</text>

  <!-- ═══ TABLA: ejecuciones ═══ -->
  <rect x="30" y="56" width="270" height="195" rx="6" fill="#E8F5E9" stroke="#009E73" stroke-width="1.5"/>
  <rect x="30" y="56" width="270" height="30" rx="6" fill="#009E73"/>
  <rect x="30" y="80" width="270" height="6" fill="#009E73"/>
  <text x="165" y="77" fill="#FFF" font-size="13" font-weight="700" text-anchor="middle"
        font-family="'JetBrains Mono',monospace">ejecuciones</text>

  <text x="52" y="108" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">🔑 id</text>
  <text x="192" y="108" fill="#888" font-size="10">INTEGER PK AUTO</text>

  <text x="52" y="130" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">   inicio</text>
  <text x="192" y="130" fill="#888" font-size="10">TEXT NOT NULL</text>

  <text x="52" y="152" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">   fin</text>
  <text x="192" y="152" fill="#888" font-size="10">TEXT (nullable)</text>

  <text x="52" y="174" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">   salas_json</text>
  <text x="192" y="174" fill="#888" font-size="10">TEXT NOT NULL</text>

  <line x1="52" y1="188" x2="278" y2="188" stroke="#ddd" stroke-width="0.5"/>
  <text x="52" y="208" fill="#666" font-size="9" font-style="italic">Tabla padre — una fila por sesion</text>
  <text x="52" y="222" fill="#666" font-size="9" font-style="italic">fin = NULL mientras esta activa</text>

  <!-- ═══ TABLA: informes ═══ -->
  <rect x="360" y="56" width="270" height="232" rx="6" fill="#E3F2FD" stroke="#0072B2" stroke-width="1.5"/>
  <rect x="360" y="56" width="270" height="30" rx="6" fill="#0072B2"/>
  <rect x="360" y="80" width="270" height="6" fill="#0072B2"/>
  <text x="495" y="77" fill="#FFF" font-size="13" font-weight="700" text-anchor="middle"
        font-family="'JetBrains Mono',monospace">informes</text>

  <text x="378" y="108" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">🔑 id</text>
  <text x="510" y="108" fill="#888" font-size="10">INTEGER PK AUTO</text>

  <text x="378" y="130" fill="#0072B2" font-size="11" font-weight="600" font-family="'JetBrains Mono',monospace">🔗 ejecucion_id</text>
  <text x="510" y="130" fill="#888" font-size="10">INTEGER NOT NULL</text>

  <text x="378" y="152" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">   sala_id</text>
  <text x="510" y="152" fill="#888" font-size="10">TEXT NOT NULL</text>

  <text x="378" y="174" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">   remitente</text>
  <text x="510" y="174" fill="#888" font-size="10">TEXT NOT NULL</text>

  <text x="378" y="196" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">   cuerpo_json</text>
  <text x="510" y="196" fill="#888" font-size="10">TEXT NOT NULL</text>

  <text x="378" y="218" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">   ts</text>
  <text x="510" y="218" fill="#888" font-size="10">TEXT NOT NULL</text>

  <line x1="378" y1="232" x2="608" y2="232" stroke="#ddd" stroke-width="0.5"/>
  <text x="378" y="252" fill="#666" font-size="9" font-style="italic">IDX: ejecucion_id</text>
  <text x="378" y="266" fill="#666" font-size="9" font-style="italic">Informe de partida (JSON ontologia)</text>

  <!-- ═══ TABLA: eventos ═══ -->
  <rect x="360" y="308" width="270" height="225" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <rect x="360" y="308" width="270" height="30" rx="6" fill="#E65100"/>
  <rect x="360" y="332" width="270" height="6" fill="#E65100"/>
  <text x="495" y="329" fill="#FFF" font-size="13" font-weight="700" text-anchor="middle"
        font-family="'JetBrains Mono',monospace">eventos</text>

  <text x="378" y="360" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">🔑 id</text>
  <text x="510" y="360" fill="#888" font-size="10">INTEGER PK AUTO</text>

  <text x="378" y="382" fill="#E65100" font-size="11" font-weight="600" font-family="'JetBrains Mono',monospace">🔗 ejecucion_id</text>
  <text x="510" y="382" fill="#888" font-size="10">INTEGER NOT NULL</text>

  <text x="378" y="404" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">   sala_id</text>
  <text x="510" y="404" fill="#888" font-size="10">TEXT NOT NULL</text>

  <text x="378" y="426" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">   tipo</text>
  <text x="510" y="426" fill="#888" font-size="10">TEXT NOT NULL</text>

  <text x="378" y="448" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">   de</text>
  <text x="510" y="448" fill="#888" font-size="10">TEXT NOT NULL</text>

  <text x="378" y="470" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">   detalle</text>
  <text x="510" y="470" fill="#888" font-size="10">TEXT NOT NULL</text>

  <text x="378" y="492" fill="#333" font-size="11" font-family="'JetBrains Mono',monospace">   ts</text>
  <text x="510" y="492" fill="#888" font-size="10">TEXT NOT NULL</text>

  <line x1="378" y1="504" x2="608" y2="504" stroke="#ddd" stroke-width="0.5"/>
  <text x="378" y="522" fill="#666" font-size="9" font-style="italic">IDX: ejecucion_id</text>

  <!-- ═══ RELACIONES FK ═══ -->
  <!-- ejecuciones.id → informes.ejecucion_id -->
  <line x1="300" y1="108" x2="360" y2="130" stroke="#0072B2" stroke-width="1.8" marker-end="url(#fk)"/>
  <text x="323" y="112" fill="#0072B2" font-size="9" font-weight="600">1:N</text>

  <!-- ejecuciones.id → eventos.ejecucion_id -->
  <line x1="300" y1="140" x2="310" y2="382" stroke="#E65100" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="310" y1="382" x2="360" y2="382" stroke="#E65100" stroke-width="1.8" marker-end="url(#fk)"/>
  <text x="316" y="270" fill="#E65100" font-size="9" font-weight="600">1:N</text>

  <!-- ═══ NOTAS ═══ -->
  <rect x="650" y="56" width="195" height="210" rx="6" fill="#F5F5F5" stroke="#ddd" stroke-width="0.8"/>
  <text x="668" y="78" fill="#333" font-size="11" font-weight="700">Decisiones de diseno</text>

  <text x="668" y="102" fill="#555" font-size="9">• JSON en columnas TEXT:</text>
  <text x="676" y="116" fill="#555" font-size="9">evita migraciones al</text>
  <text x="676" y="130" fill="#555" font-size="9">evolucionar la ontologia</text>

  <text x="668" y="152" fill="#555" font-size="9">• Dos formatos de tiempo:</text>
  <text x="676" y="166" fill="#555" font-size="9">ISO (ejecuciones) para</text>
  <text x="676" y="180" fill="#555" font-size="9">fecha absoluta; HH:MM:SS</text>
  <text x="676" y="194" fill="#555" font-size="9">(informes/eventos) para</text>
  <text x="676" y="208" fill="#555" font-size="9">tiempo relativo en sesion</text>

  <text x="668" y="232" fill="#555" font-size="9">• Al finalizar se actualizan</text>
  <text x="676" y="246" fill="#555" font-size="9">fin y salas_json (filtrada)</text>

  <rect x="650" y="286" width="195" height="90" rx="6" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="668" y="308" fill="#8B6914" font-size="11" font-weight="700">Cardinalidad</text>
  <text x="668" y="330" fill="#555" font-size="10">1 ejecucion → N informes</text>
  <text x="668" y="350" fill="#555" font-size="10">1 ejecucion → N eventos</text>
  <text x="668" y="368" fill="#555" font-size="9" font-style="italic">Aislamiento por ejecucion_id</text>
</svg>

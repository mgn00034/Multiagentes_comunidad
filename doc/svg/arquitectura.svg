<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 930" font-family="'Source Sans 3','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M1,1 L7,3 L1,5" fill="none" stroke="#555" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M1,1 L7,3 L1,5" fill="none" stroke="#009E73" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M1,1 L7,3 L1,5" fill="none" stroke="#9C27B0" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="820" height="930" rx="8" fill="#FFFFFF"/>

  <!-- ═══ Servidor XMPP ═══ -->
  <rect x="40" y="20" width="740" height="370" rx="8" fill="rgba(0,158,115,0.05)" stroke="#009E73" stroke-width="0.8" stroke-dasharray="5,2"/>
  <text x="60" y="46" fill="#007A59" font-size="14" font-weight="700" font-family="'Crimson Pro',serif">Servidor XMPP (Prosody)</text>

  <!-- ─── Sala MUC 1 ─── -->
  <rect x="60" y="62" width="340" height="148" rx="6" fill="rgba(249,168,37,0.08)" stroke="#F9A825" stroke-width="0.8" stroke-dasharray="5,2"/>
  <text x="80" y="82" fill="#8B6914" font-size="11" font-weight="600" font-family="'JetBrains Mono',monospace">Sala MUC: tictactoe@conference.{dominio}</text>

  <rect x="80" y="96" width="120" height="34" rx="5" fill="#E3F2FD" stroke="#0072B2" stroke-width="1.2"/>
  <text x="140" y="118" fill="#005A8C" text-anchor="middle" font-size="11" font-weight="500" font-family="'JetBrains Mono',monospace">tablero_mesa1</text>

  <rect x="212" y="96" width="120" height="34" rx="5" fill="#E3F2FD" stroke="#0072B2" stroke-width="1.2"/>
  <text x="272" y="118" fill="#005A8C" text-anchor="middle" font-size="11" font-weight="500" font-family="'JetBrains Mono',monospace">tablero_mesa2</text>

  <text x="346" y="118" fill="#888" font-size="11">...</text>

  <rect x="80" y="140" width="120" height="34" rx="5" fill="#FFF3E0" stroke="#D55E00" stroke-width="1.2"/>
  <text x="140" y="162" fill="#B34700" text-anchor="middle" font-size="11" font-weight="500" font-family="'JetBrains Mono',monospace">jugador_ana</text>

  <rect x="212" y="140" width="120" height="34" rx="5" fill="#FFF3E0" stroke="#D55E00" stroke-width="1.2"/>
  <text x="272" y="162" fill="#B34700" text-anchor="middle" font-size="11" font-weight="500" font-family="'JetBrains Mono',monospace">jugador_luis</text>

  <!-- Broadcast presencia sala 1 -->
  <line x1="80" y1="186" x2="380" y2="186" stroke="#aaa" stroke-width="0.7" stroke-dasharray="3,3"/>
  <text x="260" y="200" fill="#888" font-size="9" font-style="italic" text-anchor="middle">presencia broadcast XEP-0045</text>

  <!-- ─── Sala MUC 2 ─── -->
  <rect x="420" y="62" width="340" height="148" rx="6" fill="rgba(249,168,37,0.08)" stroke="#F9A825" stroke-width="0.8" stroke-dasharray="5,2"/>
  <text x="440" y="82" fill="#8B6914" font-size="11" font-weight="600" font-family="'JetBrains Mono',monospace">Sala MUC: torneo@conference.{dominio}</text>

  <rect x="440" y="96" width="120" height="34" rx="5" fill="#E3F2FD" stroke="#0072B2" stroke-width="1.2"/>
  <text x="500" y="118" fill="#005A8C" text-anchor="middle" font-size="11" font-weight="500" font-family="'JetBrains Mono',monospace">tablero_t1</text>

  <rect x="572" y="96" width="120" height="34" rx="5" fill="#E3F2FD" stroke="#0072B2" stroke-width="1.2"/>
  <text x="632" y="118" fill="#005A8C" text-anchor="middle" font-size="11" font-weight="500" font-family="'JetBrains Mono',monospace">tablero_t2</text>

  <rect x="440" y="140" width="120" height="34" rx="5" fill="#FFF3E0" stroke="#D55E00" stroke-width="1.2"/>
  <text x="500" y="162" fill="#B34700" text-anchor="middle" font-size="11" font-weight="500" font-family="'JetBrains Mono',monospace">jugador_marta</text>

  <rect x="572" y="140" width="120" height="34" rx="5" fill="#FFF3E0" stroke="#D55E00" stroke-width="1.2"/>
  <text x="632" y="162" fill="#B34700" text-anchor="middle" font-size="11" font-weight="500" font-family="'JetBrains Mono',monospace">jugador_pablo</text>

  <!-- Broadcast presencia sala 2 -->
  <line x1="440" y1="186" x2="740" y2="186" stroke="#aaa" stroke-width="0.7" stroke-dasharray="3,3"/>
  <text x="620" y="200" fill="#888" font-size="9" font-style="italic" text-anchor="middle">presencia broadcast XEP-0045</text>

  <!-- Indicador de mas salas -->
  <rect x="300" y="224" width="220" height="28" rx="14" fill="#F5F5F5" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="410" y="243" fill="#888" text-anchor="middle" font-size="11" font-style="italic">... mas salas MUC configurables ...</text>

  <!-- ─── Supervisor en MUC ─── -->
  <rect x="140" y="270" width="540" height="42" rx="8" fill="#E8F5E9" stroke="#009E73" stroke-width="1.5"/>
  <text x="410" y="290" fill="#007A59" text-anchor="middle" font-size="13" font-weight="600" font-family="'JetBrains Mono',monospace">supervisor (apodo MUC en cada sala)</text>
  <text x="410" y="306" fill="#666" text-anchor="middle" font-size="10">Se suscribe a todas las salas configuradas en salas_muc</text>

  <!-- Lineas de presencia de cada sala al supervisor -->
  <line x1="230" y1="206" x2="230" y2="270" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="590" y1="206" x2="590" y2="270" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Nota explicativa -->
  <text x="140" y="338" fill="#666" font-size="10">Cada sala tiene sus propios ocupantes, informes y log independientes.</text>
  <text x="140" y="352" fill="#666" font-size="10">La deteccion de tableros finalizados es reactiva (callback _on_presencia_muc, paso 0).</text>

  <!-- Dos lineas MUC → Agente (presencia push + polling) -->
  <!-- Linea izquierda: _on_presencia_muc (push) -->
  <line x1="350" y1="358" x2="350" y2="420" stroke="#9C27B0" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="310" y="396" fill="#7B1FA2" font-size="9" font-weight="600" text-anchor="end">_on_presencia_muc</text>
  <text x="310" y="408" fill="#7B1FA2" font-size="8" text-anchor="end">(push reactivo)</text>

  <!-- Linea derecha: heartbeat periodico del dashboard -->
  <line x1="470" y1="358" x2="470" y2="420" stroke="#F9A825" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="396" fill="#8B6914" font-size="9" font-weight="600">MonitorizarMUC</text>
  <text x="510" y="408" fill="#8B6914" font-size="8">(heartbeat periodico)</text>

  <!-- ═══ AgenteSupervisor ═══ -->
  <rect x="130" y="426" width="560" height="420" rx="8" fill="rgba(0,158,115,0.06)" stroke="#009E73" stroke-width="1.5"/>
  <text x="150" y="452" fill="#1B5E20" font-size="15" font-weight="700" font-family="'Crimson Pro',serif">AgenteSupervisor</text>
  <text x="150" y="468" fill="#666" font-size="11">(agente SPADE)</text>

  <!-- _on_presencia_muc callback -->
  <rect x="150" y="484" width="240" height="48" rx="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.2"/>
  <text x="160" y="504" fill="#7B1FA2" font-size="12" font-weight="600" font-family="'JetBrains Mono',monospace">_on_presencia_muc callback</text>
  <text x="160" y="522" fill="#666" font-size="10">Detecta status="finished"</text>

  <!-- Flecha callback → crea FSM -->
  <line x1="390" y1="508" x2="430" y2="508" stroke="#9C27B0" stroke-width="1.2" marker-end="url(#arrow-purple)"/>
  <text x="410" y="500" fill="#7B1FA2" font-size="8" text-anchor="middle">crea</text>

  <!-- SolicitarInformeFSM (dinamico) -->
  <rect x="432" y="484" width="240" height="48" rx="6" fill="rgba(0,114,178,0.08)" stroke="#0072B2" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="442" y="504" fill="#005A8C" font-size="12" font-weight="600" font-family="'JetBrains Mono',monospace">SolicitarInformeFSM</text>
  <text x="442" y="522" fill="#666" font-size="10">FSMBehaviour (6 estados, N inst.)</text>

  <!-- MonitorizarMUC -->
  <rect x="150" y="550" width="240" height="48" rx="6" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.2"/>
  <text x="160" y="570" fill="#8B6914" font-size="12" font-weight="600" font-family="'JetBrains Mono',monospace">MonitorizarMUCBehaviour</text>
  <text x="160" y="588" fill="#666" font-size="10">PeriodicBehaviour (10 s)</text>

  <text x="410" y="568" fill="#555" font-size="10">Actualiza ocupantes_por_sala</text>
  <text x="410" y="582" fill="#555" font-size="10">y tablero_a_sala (dashboard)</text>

  <!-- Servidor Web -->
  <rect x="150" y="616" width="240" height="48" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.2"/>
  <text x="160" y="636" fill="#2E7D32" font-size="12" font-weight="600" font-family="'JetBrains Mono',monospace">Servidor Web (dashboard)</text>
  <text x="160" y="654" fill="#666" font-size="10">aiohttp en puerto 10090</text>

  <text x="410" y="634" fill="#555" font-size="10">GET /supervisor (HTML)</text>
  <text x="410" y="648" fill="#555" font-size="10">GET /supervisor/api/state (JSON)</text>

  <!-- Descripcion FSM estados -->
  <rect x="432" y="682" width="240" height="114" rx="6" fill="#F5F5F5" stroke="#ddd" stroke-width="0.8"/>
  <text x="442" y="700" fill="#333" font-size="10" font-weight="600">Estados del FSM:</text>
  <text x="442" y="716" fill="#007A59" font-size="9" font-family="'JetBrains Mono',monospace">ENVIAR_REQUEST</text>
  <text x="564" y="716" fill="#888" font-size="9">→ envia REQUEST</text>
  <text x="442" y="730" fill="#8B6914" font-size="9" font-family="'JetBrains Mono',monospace">ESPERAR_RESPUESTA</text>
  <text x="592" y="730" fill="#888" font-size="9">→ 1.ª resp.</text>
  <text x="442" y="744" fill="#8B6914" font-size="9" font-family="'JetBrains Mono',monospace">ESPERAR_INFORME</text>
  <text x="575" y="744" fill="#888" font-size="9">→ tras AGREE</text>
  <text x="442" y="762" fill="#005A8C" font-size="9" font-family="'JetBrains Mono',monospace">PROCESAR_INFORME</text>
  <text x="578" y="762" fill="#888" font-size="9">→ caso A/A2</text>
  <text x="442" y="776" fill="#B34700" font-size="9" font-family="'JetBrains Mono',monospace">PROCESAR_RECHAZO</text>
  <text x="580" y="776" fill="#888" font-size="9">→ caso B</text>
  <text x="442" y="790" fill="#C62828" font-size="9" font-family="'JetBrains Mono',monospace">REGISTRAR_TIMEOUT</text>
  <text x="582" y="790" fill="#888" font-size="9">→ caso C</text>

  <!-- Navegador -->
  <rect x="190" y="870" width="260" height="36" rx="6" fill="#F5F5F5" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="320" y="893" fill="#555" text-anchor="middle" font-size="12">Navegador (polling cada 5 s)</text>

  <line x1="320" y1="664" x2="320" y2="870" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ═══ Leyenda ═══ -->
  <rect x="695" y="432" width="100" height="178" rx="5" fill="#F5F5F5" stroke="#ddd" stroke-width="0.5"/>
  <rect x="704" y="442" width="12" height="12" rx="2" fill="#0072B2"/>
  <text x="722" y="453" fill="#333" font-size="10">Tablero</text>
  <rect x="704" y="462" width="12" height="12" rx="2" fill="#D55E00"/>
  <text x="722" y="473" fill="#333" font-size="10">Jugador</text>
  <rect x="704" y="482" width="12" height="12" rx="2" fill="#009E73"/>
  <text x="722" y="493" fill="#333" font-size="10">Supervisor</text>
  <rect x="704" y="502" width="12" height="12" rx="2" fill="#F9A825"/>
  <text x="722" y="513" fill="#333" font-size="10">Periodico</text>
  <rect x="704" y="522" width="12" height="12" rx="2" fill="#9C27B0"/>
  <text x="722" y="533" fill="#333" font-size="10">Callback</text>
  <rect x="704" y="542" width="12" height="12" rx="2" fill="none" stroke="#0072B2" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="722" y="553" fill="#333" font-size="10">FSM (din.)</text>

  <line x1="704" y1="572" x2="724" y2="572" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="730" y="576" fill="#333" font-size="10">Presencia</text>
  <line x1="704" y1="590" x2="724" y2="590" stroke="#9C27B0" stroke-width="2"/>
  <text x="730" y="594" fill="#333" font-size="10">Push</text>
  <line x1="704" y1="606" x2="724" y2="606" stroke="#F9A825" stroke-width="1.5"/>
  <text x="730" y="610" fill="#333" font-size="10">Polling</text>
</svg>

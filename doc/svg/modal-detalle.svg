<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 640" font-family="'Source Sans 3','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13">

  <!-- Fondo claro -->
  <rect width="820" height="640" rx="8" fill="#FFFFFF"/>

  <!-- Overlay semitransparente (simula fondo atenuado) -->
  <rect width="820" height="640" rx="8" fill="#e0e0e0" opacity="0.45"/>

  <!-- ═══ MODAL (centrado) ═══ -->
  <rect x="170" y="30" width="480" height="580" rx="10" fill="#FAFAFA" stroke="#bbb" stroke-width="1"/>

  <!-- Boton cerrar -->
  <rect x="608" y="42" width="28" height="28" rx="14" fill="none" stroke="#999" stroke-width="0.8"/>
  <text x="622" y="62" fill="#666" font-size="14" text-anchor="middle">✕</text>
  <text x="660" y="62" fill="#888" font-size="9" font-style="italic">ESC o clic</text>
  <text x="660" y="74" fill="#888" font-size="9" font-style="italic">en overlay</text>

  <!-- ═══ BANNER DE RESULTADO ═══ -->
  <rect x="190" y="80" width="440" height="52" rx="8" fill="#E8F5E9" stroke="#4CAF5050" stroke-width="1"/>
  <text x="220" y="108" fill="#2E7D32" font-size="20">🏆</text>
  <text x="250" y="112" fill="#2E7D32" font-size="16" font-weight="700">Victoria de ana</text>
  <text x="580" y="112" fill="#555" font-size="11" text-anchor="end">Ficha X gana en 7 turnos</text>

  <!-- ═══ TARJETAS DE JUGADORES ═══ -->
  <text x="210" y="154" fill="#333" font-size="11" font-weight="600">Jugadores</text>

  <!-- Jugador X (ganador) -->
  <rect x="190" y="164" width="210" height="80" rx="6" fill="#E3F2FD" stroke="#0072B255" stroke-width="2"/>
  <text x="210" y="188" fill="#0072B2" font-size="18" font-weight="700">X</text>
  <text x="232" y="188" fill="#333" font-size="13" font-weight="600">ana</text>
  <rect x="292" y="175" width="68" height="18" rx="9" fill="#E8F5E9" stroke="none"/>
  <text x="326" y="188" fill="#2E7D32" font-size="9" font-weight="600" text-anchor="middle">★ Ganador</text>
  <text x="210" y="210" fill="#888" font-size="10" font-family="'JetBrains Mono',monospace">jugador_ana@sinbad2...</text>
  <text x="210" y="228" fill="#888" font-size="10">3 victorias · 0 derrotas · 1 empate</text>

  <!-- Jugador O (perdedor) -->
  <rect x="420" y="164" width="210" height="80" rx="6" fill="#F5F5F5" stroke="#ddd" stroke-width="1"/>
  <text x="440" y="188" fill="#D55E00" font-size="18" font-weight="700">O</text>
  <text x="462" y="188" fill="#333" font-size="13" font-weight="600">luis</text>
  <rect x="502" y="175" width="82" height="18" rx="9" fill="#FDE8E8" stroke="none"/>
  <text x="543" y="188" fill="#C62828" font-size="9" font-weight="600" text-anchor="middle">Derrota</text>
  <text x="440" y="210" fill="#888" font-size="10" font-family="'JetBrains Mono',monospace">jugador_luis@sinbad2...</text>
  <text x="440" y="228" fill="#888" font-size="10">1 victoria · 2 derrotas · 1 empate</text>

  <!-- ═══ TABLERO SVG GRANDE ═══ -->
  <text x="210" y="270" fill="#333" font-size="11" font-weight="600">Tablero final</text>

  <rect x="280" y="280" width="180" height="180" rx="6" fill="#F5F5F5" stroke="#ccc" stroke-width="0.8"/>
  <!-- Grid 3x3 -->
  <line x1="340" y1="284" x2="340" y2="456" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="400" y1="284" x2="400" y2="456" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="284" y1="340" x2="456" y2="340" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="284" y1="400" x2="456" y2="400" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Fichas (X azul, O naranja) -->
  <!-- (0,0) X -->
  <line x1="300" y1="300" x2="322" y2="322" stroke="#0072B2" stroke-width="3" stroke-linecap="round"/>
  <line x1="322" y1="300" x2="300" y2="322" stroke="#0072B2" stroke-width="3" stroke-linecap="round"/>
  <!-- (0,1) O -->
  <circle cx="370" cy="311" r="14" fill="none" stroke="#D55E00" stroke-width="3"/>
  <!-- (0,2) X -->
  <line x1="418" y1="300" x2="440" y2="322" stroke="#0072B2" stroke-width="3" stroke-linecap="round"/>
  <line x1="440" y1="300" x2="418" y2="322" stroke="#0072B2" stroke-width="3" stroke-linecap="round"/>

  <!-- (1,0) O -->
  <circle cx="311" cy="370" r="14" fill="none" stroke="#D55E00" stroke-width="3"/>
  <!-- (1,1) X -->
  <line x1="358" y1="358" x2="382" y2="382" stroke="#0072B2" stroke-width="3" stroke-linecap="round"/>
  <line x1="382" y1="358" x2="358" y2="382" stroke="#0072B2" stroke-width="3" stroke-linecap="round"/>
  <!-- (1,2) O -->
  <circle cx="429" cy="370" r="14" fill="none" stroke="#D55E00" stroke-width="3"/>

  <!-- (2,0) O -->
  <circle cx="311" cy="429" r="14" fill="none" stroke="#D55E00" stroke-width="3"/>
  <!-- (2,1) vacio -->
  <!-- (2,2) X -->
  <line x1="418" y1="418" x2="440" y2="440" stroke="#0072B2" stroke-width="3" stroke-linecap="round"/>
  <line x1="440" y1="418" x2="418" y2="440" stroke="#0072B2" stroke-width="3" stroke-linecap="round"/>

  <!-- Linea ganadora diagonal (X gana) -->
  <line x1="311" y1="311" x2="429" y2="429" stroke="#0072B2" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <!-- ═══ METADATOS TECNICOS ═══ -->
  <text x="210" y="484" fill="#333" font-size="11" font-weight="600">Detalles tecnicos</text>

  <rect x="190" y="494" width="440" height="96" rx="6" fill="#F5F5F5" stroke="#ccc" stroke-width="0.8"/>
  <text x="210" y="516" fill="#888" font-size="10">Tablero emisor:</text>
  <text x="330" y="516" fill="#333" font-size="10" font-family="'JetBrains Mono',monospace">tablero_mesa1@sinbad2.ujaen.es</text>
  <text x="210" y="536" fill="#888" font-size="10">Hora de recepcion:</text>
  <text x="330" y="536" fill="#333" font-size="10" font-family="'JetBrains Mono',monospace">14:32:50</text>
  <text x="210" y="556" fill="#888" font-size="10">Turnos jugados:</text>
  <text x="330" y="556" fill="#333" font-size="10" font-family="'JetBrains Mono',monospace">7</text>
  <text x="210" y="576" fill="#888" font-size="10">Resultado ontologia:</text>
  <text x="330" y="576" fill="#333" font-size="10" font-family="'JetBrains Mono',monospace">win (ficha_ganadora: X)</text>

  <!-- ═══ ANOTACIONES ═══ -->
  <text x="80" y="112" fill="#2E7D32" font-size="9" text-anchor="end">Color segun</text>
  <text x="80" y="124" fill="#2E7D32" font-size="9" text-anchor="end">resultado</text>
  <line x1="84" y1="106" x2="186" y2="106" stroke="#2E7D3240" stroke-width="0.8" stroke-dasharray="3,2"/>

  <text x="80" y="200" fill="#0072B2" font-size="9" text-anchor="end">Borde grueso</text>
  <text x="80" y="212" fill="#0072B2" font-size="9" text-anchor="end">= ganador</text>
  <line x1="84" y1="200" x2="186" y2="200" stroke="#0072B240" stroke-width="0.8" stroke-dasharray="3,2"/>

  <text x="660" y="360" fill="#0072B2" font-size="9">Linea ganadora</text>
  <text x="660" y="374" fill="#0072B2" font-size="9">semitransp.</text>
  <line x1="460" y1="370" x2="656" y2="370" stroke="#0072B240" stroke-width="0.8" stroke-dasharray="3,2"/>
</svg>

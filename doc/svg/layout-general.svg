  <text x="56" y="260" fill="#666" font-size="9">● 4 agentes  ★ 3 informes</text>
  <text x="56" y="274" fill="#888" font-size="8" font-family="'JetBrains Mono',monospace">torneo_a@conf...</text>

  <!-- Sala 3 -->
  <rect x="42" y="296" width="156" height="60" rx="5" fill="#F5F5F5" stroke="#ddd" stroke-width="0.8"/>

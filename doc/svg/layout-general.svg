  <rect x="680" y="200" width="80" height="28" rx="4" fill="#E3F2FD" stroke="#0072B2" stroke-width="0.8"/>
  <text x="720" y="218" fill="#005A8C" font-size="9" text-anchor="middle">⊕ 4 Jugad.</text>

  <!-- ── Tabs ── -->
  <rect x="234" y="242" width="544" height="34" rx="17" fill="#F5F5F5" stroke="#ddd" stroke-width="0.8"/>

  <rect x="240" y="246" width="110" height="26" rx="13" fill="#009E73" stroke="none"/>

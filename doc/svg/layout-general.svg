  <text x="440" y="338" fill="#333" font-size="8" text-anchor="middle">⬡ Empate</text>
  <rect x="405" y="346" width="40" height="40" rx="2" fill="#F5F5F5" stroke="#ddd" stroke-width="0.5"/>
  <text x="425" y="370" fill="#aaa" font-size="8" text-anchor="middle">SVG</text>
  <text x="440" y="400" fill="#666" font-size="7" text-anchor="middle">carlos contradiana · 9t</text>

  <rect x="510" y="316" width="120" height="90" rx="4" fill="#FFF" stroke="#E65100" stroke-width="1"/>
  <rect x="510" y="316" width="3" height="90" rx="1" fill="#E65100"/>
  <text x="570" y="338" fill="#333" font-size="8" text-anchor="middle">⚠ Abortada</text>
  <rect x="535" y="346" width="40" height="40" rx="2" fill="#F5F5F5" stroke="#ddd" stroke-width="0.5"/>
  <text x="555" y="370" fill="#aaa" font-size="8" text-anchor="middle">SVG</text>
  <text x="570" y="400" fill="#666" font-size="7" text-anchor="middle">elena contrafrank · 3t</text>

  <rect x="640" y="316" width="120" height="90" rx="4" fill="#FFF" stroke="#4CAF50" stroke-width="1"/>
  <rect x="640" y="316" width="3" height="90" rx="1" fill="#4CAF50"/>
  <text x="700" y="338" fill="#333" font-size="8" text-anchor="middle">★ Victoria O</text>
  <rect x="665" y="346" width="40" height="40" rx="2" fill="#F5F5F5" stroke="#ddd" stroke-width="0.5"/>
  <text x="685" y="370" fill="#aaa" font-size="8" text-anchor="middle">SVG</text>
  <text x="700" y="400" fill="#666" font-size="7" text-anchor="middle">gema contrahector · 5t</text>

  <text x="400" y="440" fill="#888" font-size="9" text-anchor="middle" font-style="italic">
    Grid auto-fill, min 240px — tarjetas con hover interactivo y clic abre modal
  </text>

  <!-- Indicador de filtros sobre el grid -->
  <rect x="250" y="460" width="260" height="20" rx="10" fill="#F5F5F5" stroke="#ddd" stroke-width="0.5"/>
  <rect x="254" y="462" width="50" height="16" rx="8" fill="#009E73"/>
  <text x="279" y="474" fill="#FFF" font-size="8" text-anchor="middle">Todos</text>
  <text x="324" y="474" fill="#666" font-size="8" text-anchor="middle">Victorias</text>
  <text x="384" y="474" fill="#666" font-size="8" text-anchor="middle">Empates</text>
  <text x="454" y="474" fill="#666" font-size="8" text-anchor="middle">Abortadas</text>
  <text x="540" y="474" fill="#888" font-size="8">← Filtros por resultado</text>

  <!-- ── Footer ── -->

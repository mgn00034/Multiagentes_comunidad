  <text x="310" y="400" fill="#666" font-size="7" text-anchor="middle">alice contrabob · 7t</text>

  <rect x="380" y="316" width="120" height="90" rx="4" fill="#FFF" stroke="#9C27B0" stroke-width="1"/>

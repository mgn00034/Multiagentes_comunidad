  <text x="689" y="86" fill="#FFF" font-size="8" text-anchor="middle">🌙</text>

  <!-- Etiqueta online dot -->
  <circle cx="178" y="83" r="4" fill="#4dd6a5"/>
  <text x="188" y="86" fill="#666" font-size="9">supervisor@servidor</text>


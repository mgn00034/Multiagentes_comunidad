  <rect x="56" y="506" width="10" height="10" rx="2" fill="#E8F5E9" stroke="#009E73" stroke-width="0.8"/>
  <text x="74" y="516" fill="#333" font-size="9">Sala activa</text>
  <rect x="56" y="522" width="10" height="10" rx="2" fill="#F5F5F5" stroke="#ddd" stroke-width="0.8"/>
  <text x="74" y="532" fill="#333" font-size="9">Sala inactiva</text>
  <rect x="56" y="538" width="10" height="10" rx="2" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="74" y="548" fill="#333" font-size="9">Selector/info</text>
  <rect x="56" y="554" width="10" height="10" rx="2" fill="#009E73"/>
  <text x="74" y="564" fill="#333" font-size="9">Tab activo</text>

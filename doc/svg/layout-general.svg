  <text x="50" y="148" fill="#666" font-size="10">Salas de juego MUC</text>

  <!-- Sala 1 (activa) -->
  <rect x="42" y="160" width="156" height="60" rx="5" fill="#E8F5E9" stroke="#009E73" stroke-width="1.5"/>
  <rect x="42" y="160" width="4" height="60" rx="2" fill="#009E73"/>
  <text x="56" y="178" fill="#1B5E20" font-size="10" font-weight="600">Sala principal</text>
  <text x="56" y="192" fill="#666" font-size="9">● 5 agentes  ★ 8 informes</text>
  <text x="56" y="206" fill="#888" font-size="8" font-family="'JetBrains Mono',monospace">tictactoe@conf...</text>

  <!-- Sala 2 -->

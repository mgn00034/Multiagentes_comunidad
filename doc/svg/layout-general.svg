<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" font-family="'Source Sans 3','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M1,1 L7,3 L1,5" fill="none" stroke="#555" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="820" height="620" rx="8" fill="#FFFFFF"/>

  <!-- Titulo -->
  <text x="410" y="28" fill="#1B5E20" font-size="15" font-weight="700" text-anchor="middle"
        font-family="'Crimson Pro',serif">Layout general del dashboard — Supervisor Tic-Tac-Toe</text>

  <!-- ═══ HEADER STICKY ═══ -->
  <rect x="30" y="46" width="760" height="56" rx="6" fill="#E8F5E9" stroke="#009E73" stroke-width="1.5"/>
  <text x="50" y="66" fill="#1B5E20" font-size="12" font-weight="700" font-family="'JetBrains Mono',monospace">HEADER STICKY</text>

  <!-- Icono + titulo -->
  <rect x="50" y="72" width="120" height="22" rx="4" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="110" y="87" fill="#2E7D32" font-size="9" text-anchor="middle" font-family="'JetBrains Mono',monospace">♟ Titulo + JID</text>

  <!-- Selector ejecucion -->
  <rect x="330" y="72" width="110" height="22" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="385" y="87" fill="#8B6914" font-size="9" text-anchor="middle" font-family="'JetBrains Mono',monospace">Ejecucion ▼</text>

  <!-- Reloj -->
  <rect x="452" y="72" width="80" height="22" rx="4" fill="#F5F5F5" stroke="#aaa" stroke-width="0.8"/>
  <text x="492" y="87" fill="#555" font-size="9" text-anchor="middle" font-family="'JetBrains Mono',monospace">12:34:56</text>

  <!-- Stats globales -->
  <rect x="544" y="72" width="120" height="22" rx="4" fill="#F5F5F5" stroke="#aaa" stroke-width="0.8"/>

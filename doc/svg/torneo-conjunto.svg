<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 600" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13">

  <!-- Fondo blanco -->
  <rect x="0" y="0" width="780" height="600" rx="8" fill="#ffffff"/>

  <!-- Titulo -->
  <text x="390" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">Fase B — Torneo conjunto en sala unica</text>

  <!-- Sala MUC central -->
  <rect x="140" y="55" width="500" height="490" rx="14" fill="#fef5f4" stroke="#c5221f" stroke-width="2"/>
  <rect x="140" y="55" width="500" height="40" rx="14" fill="#c5221f"/>
  <rect x="140" y="80" width="500" height="15" fill="#c5221f"/>
  <text x="390" y="82" text-anchor="middle" font-weight="bold" fill="white" font-size="15">torneo_lab@conference.sinbad2.ujaen.es</text>

  <!-- Supervisor -->
  <rect x="300" y="108" width="180" height="32" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.2"/>
  <text x="390" y="129" text-anchor="middle" fill="#1a73e8" font-size="12" font-weight="bold">supervisor (L2PC00)</text>

  <!-- Separador -->
  <line x1="170" y1="155" x2="610" y2="155" stroke="#c5221f" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Columna TABLEROS -->
  <text x="265" y="178" text-anchor="middle" font-weight="bold" fill="#137333" font-size="13">Tableros</text>

  <rect x="170" y="190" width="190" height="30" rx="6" fill="#e6f4ea" stroke="#34a853" stroke-width="0.8"/>
  <text x="265" y="210" text-anchor="middle" fill="#137333" font-size="11">tablero_jperez</text>

  <rect x="170" y="228" width="190" height="30" rx="6" fill="#e6f4ea" stroke="#34a853" stroke-width="0.8"/>
  <text x="265" y="248" text-anchor="middle" fill="#137333" font-size="11">tablero_mgarcia</text>

  <rect x="170" y="266" width="190" height="30" rx="6" fill="#e6f4ea" stroke="#34a853" stroke-width="0.8"/>
  <text x="265" y="286" text-anchor="middle" fill="#137333" font-size="11">tablero_alopez</text>

  <rect x="170" y="304" width="190" height="30" rx="6" fill="#e6f4ea" stroke="#34a853" stroke-width="0.8"/>
  <text x="265" y="324" text-anchor="middle" fill="#137333" font-size="11">tablero_cmartin</text>

  <rect x="170" y="342" width="190" height="30" rx="6" fill="#e6f4ea" stroke="#34a853" stroke-width="0.8"/>
  <text x="265" y="362" text-anchor="middle" fill="#137333" font-size="11">tablero_lruiz</text>

  <text x="265" y="394" text-anchor="middle" fill="#bbb" font-size="14">...</text>

  <rect x="170" y="406" width="190" height="30" rx="6" fill="#e6f4ea" stroke="#34a853" stroke-width="0.8"/>
  <text x="265" y="426" text-anchor="middle" fill="#137333" font-size="11">tablero_enavarro</text>

  <!-- Columna JUGADORES -->
  <text x="515" y="178" text-anchor="middle" font-weight="bold" fill="#7b1fa2" font-size="13">Jugadores</text>

  <rect x="420" y="190" width="190" height="30" rx="6" fill="#f3e8fd" stroke="#7b1fa2" stroke-width="0.8"/>
  <text x="515" y="210" text-anchor="middle" fill="#7b1fa2" font-size="11">jugador_jperez</text>

  <rect x="420" y="228" width="190" height="30" rx="6" fill="#f3e8fd" stroke="#7b1fa2" stroke-width="0.8"/>
  <text x="515" y="248" text-anchor="middle" fill="#7b1fa2" font-size="11">jugador_mgarcia</text>

  <rect x="420" y="266" width="190" height="30" rx="6" fill="#f3e8fd" stroke="#7b1fa2" stroke-width="0.8"/>
  <text x="515" y="286" text-anchor="middle" fill="#7b1fa2" font-size="11">jugador_alopez</text>

  <rect x="420" y="304" width="190" height="30" rx="6" fill="#f3e8fd" stroke="#7b1fa2" stroke-width="0.8"/>
  <text x="515" y="324" text-anchor="middle" fill="#7b1fa2" font-size="11">jugador_cmartin</text>

  <rect x="420" y="342" width="190" height="30" rx="6" fill="#f3e8fd" stroke="#7b1fa2" stroke-width="0.8"/>
  <text x="515" y="362" text-anchor="middle" fill="#7b1fa2" font-size="11">jugador_lruiz</text>

  <text x="515" y="394" text-anchor="middle" fill="#bbb" font-size="14">...</text>

  <rect x="420" y="406" width="190" height="30" rx="6" fill="#f3e8fd" stroke="#7b1fa2" stroke-width="0.8"/>
  <text x="515" y="426" text-anchor="middle" fill="#7b1fa2" font-size="11">jugador_enavarro</text>

  <!-- Resumen inferior -->
  <rect x="170" y="452" width="440" height="80" rx="8" fill="white" stroke="#c5221f" stroke-width="0.8"/>

  <text x="390" y="478" text-anchor="middle" fill="#333" font-size="13">Cada alumno aporta <tspan font-weight="bold">1 tablero</tspan> + <tspan font-weight="bold">1 jugador</tspan></text>
  <text x="390" y="498" text-anchor="middle" fill="#333" font-size="13">con su <tspan font-weight="bold" fill="#c5221f">usuario de la universidad</tspan> como identificador</text>
  <text x="390" y="520" text-anchor="middle" fill="#999" font-size="11">30 alumnos = 30 tableros + 30 jugadores = partidas cruzadas entre todos</text>

  <!-- Flechas cruzadas para ilustrar interoperabilidad -->
  <line x1="360" y1="210" x2="420" y2="248" stroke="#999" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="360" y1="248" x2="420" y2="286" stroke="#999" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="360" y1="286" x2="420" y2="210" stroke="#999" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="360" y1="324" x2="420" y2="362" stroke="#999" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="360" y1="362" x2="420" y2="324" stroke="#999" stroke-width="0.8" stroke-dasharray="4,3"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 740" font-family="'Source Sans 3','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M1,1 L7,3 L1,5" fill="none" stroke="#555" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M1,1 L7,3 L1,5" fill="none" stroke="#009E73" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M1,1 L7,3 L1,5" fill="none" stroke="#0072B2" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="800" height="740" rx="8" fill="#FFFFFF"/>

  <!-- ═══ Servidor XMPP (x=30 y=16 w=740 h=374) ═══ -->
  <rect x="30" y="16" width="740" height="374" rx="8" fill="rgba(0,158,115,0.05)" stroke="#009E73" stroke-width="0.8" stroke-dasharray="5,2"/>
  <text x="50" y="42" fill="#007A59" font-size="14" font-weight="700" font-family="'Crimson Pro',serif">Servidor XMPP (perfil activo de config.yaml)</text>
  <text x="50" y="58" fill="#888" font-size="10">local: Docker localhost:5222  |  servidor: sinbad2.ujaen.es:8022</text>

  <!-- ─── Supervisor (real) (x=50 y=76 w=210 h=174) ─── -->
  <rect x="50" y="76" width="210" height="174" rx="6" fill="#E8F5E9" stroke="#009E73" stroke-width="1.5"/>
  <text x="155" y="98" fill="#007A59" text-anchor="middle" font-size="13" font-weight="700">Supervisor</text>
  <text x="155" y="114" fill="#666" text-anchor="middle" font-size="10" font-style="italic">(agente real)</text>

  <circle cx="72" cy="136" r="3.5" fill="#009E73"/>
  <text x="82" y="140" fill="#333" font-size="11">Panel web</text>
  <circle cx="72" cy="156" r="3.5" fill="#009E73"/>
  <text x="82" y="160" fill="#333" font-size="11">Manejador presencia</text>
  <circle cx="72" cy="176" r="3.5" fill="#009E73"/>
  <text x="82" y="180" fill="#333" font-size="11">FSM informes</text>
  <circle cx="72" cy="196" r="3.5" fill="#009E73"/>
  <text x="82" y="200" fill="#333" font-size="11">Persistencia SQLite</text>
  <circle cx="72" cy="216" r="3.5" fill="#009E73"/>
  <text x="82" y="220" fill="#333" font-size="11">MonitorizarMUC</text>

  <!-- ─── Tablero (simulado) (x=300 y=76 w=210 h=174) ─── -->
  <rect x="300" y="76" width="210" height="174" rx="6" fill="#E3F2FD" stroke="#0072B2" stroke-width="1.5"/>
  <text x="405" y="98" fill="#005A8C" text-anchor="middle" font-size="13" font-weight="700">Tablero</text>
  <text x="405" y="114" fill="#666" text-anchor="middle" font-size="10" font-style="italic">(agente simulado)</text>

  <circle cx="322" cy="136" r="3.5" fill="#0072B2"/>
  <text x="332" y="140" fill="#333" font-size="11">Unirse a sala MUC</text>
  <circle cx="322" cy="156" r="3.5" fill="#0072B2"/>
  <text x="332" y="160" fill="#333" font-size="11">Cambiar estado</text>
  <text x="332" y="174" fill="#888" font-size="9">waiting → playing → finished</text>
  <circle cx="322" cy="192" r="3.5" fill="#0072B2"/>
  <text x="332" y="196" fill="#333" font-size="11">Responder REQUEST</text>
  <text x="332" y="210" fill="#888" font-size="9">Modo: victoria, empate,</text>
  <text x="332" y="222" fill="#888" font-size="9">refuse, timeout...</text>

  <!-- ─── Jugador (simulado) (x=550 y=76 w=200 h=174) ─── -->
  <rect x="550" y="76" width="200" height="174" rx="6" fill="#FFF3E0" stroke="#D55E00" stroke-width="1.5"/>
  <text x="650" y="98" fill="#B34700" text-anchor="middle" font-size="13" font-weight="700">Jugador</text>
  <text x="650" y="114" fill="#666" text-anchor="middle" font-size="10" font-style="italic">(agente simulado)</text>

  <circle cx="572" cy="136" r="3.5" fill="#D55E00"/>
  <text x="582" y="140" fill="#333" font-size="11">Unirse a sala MUC</text>
  <circle cx="572" cy="156" r="3.5" fill="#D55E00"/>
  <text x="582" y="160" fill="#333" font-size="11">Presencia chat</text>
  <circle cx="572" cy="176" r="3.5" fill="#D55E00"/>
  <text x="582" y="180" fill="#333" font-size="11">Abandonar sala</text>
  <circle cx="572" cy="196" r="3.5" fill="#D55E00"/>
  <text x="582" y="200" fill="#333" font-size="11">Nivel estrategia (1-4)</text>

  <!-- Flechas FIPA-Request entre Supervisor y Tablero -->
  <line x1="260" y1="156" x2="300" y2="156" stroke="#0072B2" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="300" y1="172" x2="260" y2="172" stroke="#009E73" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="280" y="149" fill="#555" text-anchor="middle" font-size="8" font-weight="600">REQUEST</text>
  <text x="280" y="186" fill="#555" text-anchor="middle" font-size="8" font-weight="600">INFORM</text>

  <!-- ─── Líneas de conexión hacia la sala MUC ─── -->
  <line x1="155" y1="250" x2="155" y2="286" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="405" y1="250" x2="405" y2="286" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="650" y1="250" x2="650" y2="286" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ─── Sala MUC (x=80 y=288 w=640 h=48) ─── -->
  <rect x="80" y="288" width="640" height="48" rx="8" fill="rgba(249,168,37,0.08)" stroke="#F9A825" stroke-width="1.2"/>
  <text x="400" y="310" fill="#8B6914" text-anchor="middle" font-size="12" font-weight="600" font-family="'JetBrains Mono',monospace">Sala MUC: test_sala_XXXXX@conference.{dominio}</text>
  <text x="400" y="326" fill="#888" text-anchor="middle" font-size="10">Nombre unico por test (basado en timestamp) — evita interferencias</text>

  <!-- Nota presencia XEP-0045 -->
  <line x1="130" y1="352" x2="670" y2="352" stroke="#aaa" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="400" y="366" fill="#888" text-anchor="middle" font-size="9" font-style="italic">presencia broadcast XEP-0045</text>

  <!-- Nota aislamiento -->
  <text x="400" y="384" fill="#666" text-anchor="middle" font-size="10">Cada test arranca sus propios agentes en una sala exclusiva</text>

  <!-- ═══ Separador ═══ -->
  <line x1="30" y1="404" x2="770" y2="404" stroke="#ddd" stroke-width="1"/>

  <!-- ═══ Test de pytest (x=30 y=418 w=740 h=308) ═══ -->
  <rect x="30" y="418" width="740" height="308" rx="8" fill="rgba(0,114,178,0.04)" stroke="#0072B2" stroke-width="0.8" stroke-dasharray="5,2"/>
  <text x="50" y="444" fill="#005A8C" font-size="14" font-weight="700" font-family="'Crimson Pro',serif">Test de pytest</text>
  <text x="50" y="460" fill="#888" font-size="10" font-family="'JetBrains Mono',monospace">tests/test_integracion_supervisor.py</text>

  <!-- Paso 1 (y=474) -->
  <rect x="50" y="474" width="28" height="28" rx="14" fill="#0072B2"/>
  <text x="64" y="494" fill="#FFF" text-anchor="middle" font-size="13" font-weight="700">1</text>
  <text x="88" y="488" fill="#333" font-size="12" font-weight="600">Crear supervisor + agentes simulados</text>
  <text x="88" y="502" fill="#888" font-size="10">Configurar modo de respuesta del tablero (victoria, empate, timeout...)</text>

  <!-- Paso 2 (y=516) -->
  <rect x="50" y="516" width="28" height="28" rx="14" fill="#0072B2"/>
  <text x="64" y="536" fill="#FFF" text-anchor="middle" font-size="13" font-weight="700">2</text>
  <text x="88" y="530" fill="#333" font-size="12" font-weight="600">Ejecutar escenario</text>
  <text x="88" y="544" fill="#888" font-size="10">Cambiar estados de presencia, esperar propagacion, simular partidas</text>

  <!-- Paso 3 (y=558) -->
  <rect x="50" y="558" width="28" height="28" rx="14" fill="#0072B2"/>
  <text x="64" y="578" fill="#FFF" text-anchor="middle" font-size="13" font-weight="700">3</text>
  <text x="88" y="574" fill="#333" font-size="12" font-weight="600">Verificar estado del supervisor</text>

  <!-- Verificaciones -->
  <text x="108" y="592" fill="#555" font-size="10" font-family="'JetBrains Mono',monospace">informes_por_sala</text>
  <text x="310" y="592" fill="#888" font-size="10">Informes recibidos por sala</text>
  <text x="108" y="608" fill="#555" font-size="10" font-family="'JetBrains Mono',monospace">ocupantes_por_sala</text>
  <text x="310" y="608" fill="#888" font-size="10">Ocupantes detectados en la MUC</text>
  <text x="108" y="624" fill="#555" font-size="10" font-family="'JetBrains Mono',monospace">log_por_sala</text>
  <text x="310" y="624" fill="#888" font-size="10">Eventos registrados (entrada, salida, presencia...)</text>
  <text x="108" y="640" fill="#555" font-size="10" font-family="'JetBrains Mono',monospace">GET /supervisor/api/state</text>
  <text x="310" y="640" fill="#888" font-size="10">Respuesta JSON de la API HTTP</text>

  <!-- Paso 4 (y=656) -->
  <rect x="50" y="656" width="28" height="28" rx="14" fill="#0072B2"/>
  <text x="64" y="676" fill="#FFF" text-anchor="middle" font-size="13" font-weight="700">4</text>
  <text x="88" y="674" fill="#333" font-size="12" font-weight="600">Detener todos los agentes</text>

  <!-- ═══ Leyenda (x=618 y=432 w=140 h=124) ═══ -->
  <rect x="618" y="432" width="140" height="124" rx="5" fill="#F5F5F5" stroke="#ddd" stroke-width="0.5"/>
  <text x="628" y="450" fill="#333" font-size="10" font-weight="700">Leyenda</text>

  <rect x="628" y="460" width="12" height="12" rx="2" fill="#009E73"/>
  <text x="646" y="471" fill="#333" font-size="10">Supervisor (real)</text>

  <rect x="628" y="480" width="12" height="12" rx="2" fill="#0072B2"/>
  <text x="646" y="491" fill="#333" font-size="10">Tablero (simulado)</text>

  <rect x="628" y="500" width="12" height="12" rx="2" fill="#D55E00"/>
  <text x="646" y="511" fill="#333" font-size="10">Jugador (simulado)</text>

  <rect x="628" y="520" width="12" height="12" rx="2" fill="rgba(249,168,37,0.3)" stroke="#F9A825" stroke-width="1"/>
  <text x="646" y="531" fill="#333" font-size="10">Sala MUC</text>

  <line x1="628" y1="544" x2="648" y2="544" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="654" y="548" fill="#333" font-size="10">Presencia</text>
</svg>
